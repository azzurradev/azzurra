name: Build Azzurra Windows Release

on:
  release:
    types: [published]

jobs:
  build-windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install PyInstaller
        run: |
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller main.py --name=azzurra

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release

          Copy-Item -Recurse dist/azzurra/_internal release/
          Copy-Item dist/azzurra/azzurra.exe release/
          Copy-Item LICENSE release/

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path release `
            -DestinationPath azzurra_windows.zip

      - name: Upload archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: azzurra_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
